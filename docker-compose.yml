version: '3.8'

services:
  pd-slacker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pd-slacker
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - PORT=8080
      - LOG_LEVEL=debug
      - PAGERDUTY_API_KEY=${PAGERDUTY_API_KEY}
      - PAGERDUTY_SCHEDULE_ID=${PAGERDUTY_SCHEDULE_ID}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_CHANNEL=${SLACK_CHANNEL:-#roee-tests}
      - TIMEZONE=${TIMEZONE:-Asia/Jerusalem}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pd-slacker-network

networks:
  pd-slacker-network:
    driver: bridge
